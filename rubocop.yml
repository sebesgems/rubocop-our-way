AllCops:
  SuggestExtensions: false
  NewCops: disable
  Exclude:
    - sig/**/*
    - db/**/*
    - vendor/**/*
    - tmp/**/*
    - bin/**/*
  TargetRubyVersion: 3.3

Layout/LineLength:
  Max: 110

Style/ClassAndModuleChildren:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Lint/UselessMethodDefinition:
  Enabled: false

Style/Lambda:
  Enabled: false

Style/MixinGrouping:
  Enabled: false

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/StringConcatenation:
  Enabled: false

Style/BlockDelimiters:
  Enabled: false

Lint/MissingSuper:
  Enabled: false

Metrics/BlockLength:
  max: 30
  Exclude:
    - "test/**/*"

Metrics/ClassLength:
  Max: 110
  Exclude:
    - "test/**/*"

Metrics/MethodLength:
  Max: 15
  Exclude:
    - "test/**/*"

Metrics/AbcSize:
  Max: 20
  Exclude:
    - "test/**/*"

OurWay/NoToFForMoney:
  Enabled: true
  AllowedReceivers:
    - Time
    - Process
